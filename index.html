<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elite Städ & Service</title>
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/homepage.css" />
  </head>

  <body>
    <div class="container">
      <div class="hero-page">
        <!-- TOP SECTION -->
        <section class="top-section">
          <!-- LEFT -->
          <div class="left-side">
            <!-- LOGO -->
            <div class="logo-section">
              <img src="images/logo.png" alt="Elite Städ & Service"/>
            </div>

            <!-- TEXT UNDER LOGO -->
            <div class="text-section">
              <div class="tagline">Renlighet. Kvalitet. Pålitlighet.</div>
              <div class="gold-separator-short"></div>
              <div class="hero-text">
                Vi skapar skinande rena miljöer så att du kan fokusera på det
                som är viktigt för dig.
              </div>
            </div>
          </div>
          <!-- RIGHT SIDE -->
          <div class="image-section">
            <img src="images/cleaning.png" alt="Cleaning service" />
            <div class="badge">
              <img src="images/badge.svg" alt="Nöjda kunder är vår prioritet" />
            </div>
          </div>
        </section>

        <!-- BOTTOM SECTION - CATEGORIES -->
        <section class="categories">
          <!-- KONTORSSTÄD -->
          <a href="kontorsstäd.html" class="category">
            <div class="category-icon">
              <img src="images/icons/kontorsstäd.svg" alt="Kontorsstäd" />
            </div>
            <div class="category-content">
              <div class="label">KONTORSSTÄD</div>
              <p>
                Rent och fräscht<br />
                på arbetsplatsen
              </p>
            </div>
          </a>

          <!-- HEMSTÄD -->
          <a href="hemstäd.html" class="category">
            <div class="category-icon">
              <img src="images/icons/hemstäd.svg" alt="Hemstäd" />
            </div>
            <div class="category-content">
              <div class="label">HEMSTÄD</div>
              <p>
                Skinande rent<br />
                i ditt hem
              </p>
            </div>
          </a>

          <!-- FLYTTSTÄD -->
          <a href="flyttstäd.html" class="category">
            <div class="category-icon">
              <img src="images/icons/flyttstäd.svg" alt="Flyttstäd" />
            </div>
            <div class="category-content">
              <div class="label">FLYTTSTÄD</div>
              <p>
                Noggrant och<br />
                klart för nästa steg
              </p>
            </div>
          </a>

          <!-- FASTIGHETSSTÄD -->
          <a href="fastighetsstäd.html" class="category">
            <div class="category-icon">
              <img src="images/icons/fastighetsstäd.svg" alt="Fastighetsstäd" />
            </div>
            <div class="category-content">
              <div class="label">FASTIGHETSSTÄD</div>
              <p>
                Vi tar hand om hela<br />
                din fastighet
              </p>
            </div>
          </a>
        </section>
      </div>
    </div>

    <script src="javascript/script.js"></script>
  </body>
</html>
