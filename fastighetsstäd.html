<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Fastighetsstäd</title>

    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/service-page.css" />
  </head>

  <body>
    <main class="service-page">
      <section class="service-hero">
        <a href="index.html" class="back-link">← Tillbaka</a>

        <div class="service-icon">
          <img src="images/icons/fastighetsstäd.svg" alt="Fastighetsstäd Icon" />
        </div>

        <h1>Fastighetsstäd</h1>
        <div class="service-gold-line"></div>
        <p>Boka professionell fastighetsstädning anpassad efter ditt behov.</p>
      </section>

      <section class="booking-section">
        <form class="booking-form">
          <div class="form-group">
            <label for="company">Företagsnamn</label>
            <input
              type="text"
              id="company"
              name="company"
              placeholder="Ex. J.A.G Städ AB"
              required
            />
          </div>

          <div class="form-group">
            <label for="phone">Telefonnummer</label>
            <input
              type="tel"
              id="phone"
              name="phone"
              placeholder="Ex. 070 123 45 67"
              required
            />
          </div>

          <div class="form-group">
            <label>Städtjänster</label>

            <div class="checkbox-grid">
              <label
                ><input type="checkbox" name="rooms" value="trappst" />
                Trappstädning</label
              >
              <label
                ><input type="checkbox" name="rooms" value="offices" />
                Entréstädning</label
              >
              <label
                ><input type="checkbox" name="rooms" value="kitchen" />
                Fönsterputs</label
              >
              <label
                ><input type="checkbox" name="rooms" value="bathrooms" />
                Golvvård</label
              >
              <label
                ><input type="checkbox" name="rooms" value="bathrooms" />
                Storstädning</label
              >
            </div>
          </div>

          <div class="form-group">
            <label>Utrymmen att städa</label>

            <div class="rooms-list">
              <div class="room-item">
                <label>
                  <input type="checkbox" name="rooms" value="Trapphus" />
                  Trapphus
                </label>

                <div class="counter">
                  <button type="button" class="minus">−</button>
                  <span class="count">0</span>
                  <button type="button" class="plus">+</button>
                </div>
              </div>

              <div class="room-item">
                <label>
                  <input type="checkbox" name="rooms" value="Hiss" />
                  Hiss
                </label>

                <div class="counter">
                  <button type="button" class="minus">−</button>
                  <span class="count">0</span>
                  <button type="button" class="plus">+</button>
                </div>
              </div>

              <div class="room-item">
                <label>
                  <input type="checkbox" name="rooms" value="Entré" />
                  Entré
                </label>

                <div class="counter">
                  <button type="button" class="minus">−</button>
                  <span class="count">0</span>
                  <button type="button" class="plus">+</button>
                </div>
              </div>

              <div class="room-item">
                <label>
                  <input type="checkbox" name="rooms" value="Tvättstuga" />
                  Tvättstuga
                </label>

                <div class="counter">
                  <button type="button" class="minus">−</button>
                  <span class="count">0</span>
                  <button type="button" class="plus">+</button>
                </div>
              </div>

              <div class="room-item">
                <label>
                  <input type="checkbox" name="rooms" value="Källare" />
                  Källare
                </label>

                <div class="counter">
                  <button type="button" class="minus">−</button>
                  <span class="count">0</span>
                  <button type="button" class="plus">+</button>
                </div>
              </div>

              <div class="room-item">
                <label>
                  <input type="checkbox" name="rooms" value="Soprum" />
                  Soprum
                </label>

                <div class="counter">
                  <button type="button" class="minus">−</button>
                  <span class="count">0</span>
                  <button type="button" class="plus">+</button>
                </div>
              </div>

              <div class="room-item">
                <label>
                  <input type="checkbox" name="rooms" value="Korridorer" />
                  Korridorer
                </label>

                <div class="counter">
                  <button type="button" class="minus">−</button>
                  <span class="count">0</span>
                  <button type="button" class="plus">+</button>
                </div>
              </div>
            </div>
          </div>

          <div class="form-group booking-calendar-area">
            <div class="calendar-column">
              <label class="calendar-title">Välj en ledig dag</label>

              <div class="custom-calendar">
                <div class="calendar-header">
                  <button type="button" id="prev-month" aria-label="Föregående månad">‹</button>
                  <h3 id="calendar-month"></h3>
                  <button type="button" id="next-month" aria-label="Nästa månad">›</button>
                </div>

                <div class="calendar-weekdays">
                  <span>Mån</span><span>Tis</span><span>Ons</span
                  ><span>Tor</span> <span>Fre</span><span>Lör</span
                  ><span>Sön</span>
                </div>

                <div class="calendar-days" id="calendar-days"></div>
              </div>
              <p class="selected-date-message" id="selected-date-message">Ingen dag är vald.</p>
            </div>
          </div>

          <button type="submit" class="submit-btn">
            Skicka bokningsförfrågan
          </button>
          <p class="booking-confirmation" id="booking-confirmation">
            Tack! Din bokningsförfrågan har skickats. Vi kontaktar dig snart.
          </p>
        </form>
      </section>
    </main>

    <script src="javascript/service-page.js"></script>
  </body>
</html>
