<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Flyttstäd</title>

    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/service-page.css" />
  </head>

  <body>
    <main class="service-page">
      <section class="service-hero">
        <a href="index.html" class="back-link">← Tillbaka</a>

        <div class="service-icon">
          <img src="images/icons/flyttstäd.svg" alt="Flyttstäd Icon" />
        </div>

        <h1>Flyttstäd</h1>
        <div class="service-gold-line"></div>
        <p>Boka professionell flyttstädning anpassad efter ditt behov.</p>
      </section>

      <section class="booking-section">
        <form class="booking-form">
          <div class="form-group">
            <label for="client">Kundsnamn</label>
            <input
              type="text"
              id="client"
              name="client"
              placeholder="Ex. John Doe"
              required
            />
          </div>

          <div class="form-group">
            <label for="phone">Telefonnummer</label>
            <input
              type="tel"
              id="phone"
              name="phone"
              placeholder="Ex. 070 123 45 67"
              required
            />
          </div>

          <div class="form-group">
            <label for="area-size">Bostadens storlek</label>
            <input
              type="text"
              id="area-size"
              name="areaSize"
              placeholder="Ex. 80 kvm"
              required
            />
          </div>

          <div class="form-group">
            <label for="area-size">Antal sovrum </label>
            <input
              type="text"
              id="area-size"
              name="areaSize"
              placeholder="Ex. 4"
              required
            />
          </div>

          <div class="form-group">
            <label for="area-size">Antal badrum </label>
            <input
              type="text"
              id="area-size"
              name="areaSize"
              placeholder="Ex. 2"
              required
            />
          </div>

          <div class="form-group">
            <label>Tillval</label>

            <div class="checkbox-grid">
              <label
                ><input type="checkbox" name="rooms" value="Balkong/Uteplats" />
                Balkong/Uteplats</label
              >
              <label
                ><input type="checkbox" name="rooms" value="Förråd" />
                Förråd</label
              >
              <label
                ><input type="checkbox" name="rooms" value="Garage" />
                Garage</label
              >
              <label
                ><input type="checkbox" name="rooms" value="Inglasad balkong" />
                Inglasad balkong</label
              >
            </div>
          </div>

          <div class="form-group booking-calendar-area">
            <div class="calendar-column">
              <label class="calendar-title">Välj en ledig dag</label>

              <div class="custom-calendar">
                <div class="calendar-header">
                  <button type="button" id="prev-month" aria-label="Föregående månad">‹</button>
                  <h3 id="calendar-month"></h3>
                  <button type="button" id="next-month" aria-label="Nästa månad">›</button>
                </div>

                <div class="calendar-weekdays">
                  <span>Mån</span><span>Tis</span><span>Ons</span
                  ><span>Tor</span> <span>Fre</span><span>Lör</span
                  ><span>Sön</span>
                </div>

                <div class="calendar-days" id="calendar-days"></div>
              </div>
              <p class="selected-date-message" id="selected-date-message">Ingen dag är vald.</p>
            </div>
          </div>

          <button type="submit" class="submit-btn">
            Skicka bokningsförfrågan
          </button>
          <p class="booking-confirmation" id="booking-confirmation">
            Tack! Din bokningsförfrågan har skickats. Vi kontaktar dig snart.
          </p>
        </form>
      </section>
    </main>

    <script src="javascript/service-page.js"></script>
  </body>
</html>
