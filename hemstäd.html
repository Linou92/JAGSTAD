<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Hemstäd</title>

    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/service-page.css" />
  </head>

  <body>
    <main class="service-page">
      <section class="service-hero">
        <a href="index.html" class="back-link">← Tillbaka</a>

        <div class="service-icon">
          <img src="images/icons/hemstäd.svg" alt="Hemstäd Icon" />
        </div>

        <h1>Hemstäd</h1>
        <div class="service-gold-line"></div>
        <p>Boka professionell hemstädning anpassad efter ditt hemmets behov.</p>
      </section>

      <section class="booking-section">
        <form class="booking-form">
          <div class="form-group">
            <label for="client">Kundsnamn</label>
            <input
              type="text"
              id="client"
              name="client"
              placeholder="Ex. John Doe"
              required
            />
          </div>

          <div class="form-group">
            <label for="phone">Telefonnummer</label>
            <input
              type="tel"
              id="phone"
              name="phone"
              placeholder="Ex. 070 123 45 67"
              required
            />
          </div>

          <div class="form-group">
            <label for="area-size">Bostadens storlek</label>
            <input
              type="text"
              id="area-size"
              name="areaSize"
              placeholder="Ex. 80 kvm"
              required
            />
          </div>

          <div class="form-group">
            <label>Städtjänster</label>

            <div class="checkbox-grid">
              <label
                ><input
                  type="checkbox"
                  name="options"
                  value="Regelbunden städning"
                />
                Regelbunden städning</label
              >
              <label
                ><input type="checkbox" name="options" value="Storstädning" />
                Storstädning</label
              >
              <label
                ><input type="checkbox" name="options" value="Fönsterputs" />
                Fönsterputs</label
              >
              <label
                ><input
                  type="checkbox"
                  name="options"
                  value="Vikning/Strykning av kläder"
                />
                Vikning/Strykning av kläder</label
              >
              <label
                ><input
                  type="checkbox"
                  name="options"
                  value="Kyl- och ugnsrengöring"
                />
                Kyl- och ugnsrengöring</label
              >
            </div>
          </div>

          <div class="form-group">
            <label>Rum att städa</label>

            <div class="rooms-list">
              <div class="room-item">
                <label>
                  <input type="checkbox" name="rooms" value="Kök" />
                  Kök
                </label>

                <div class="counter">
                  <button type="button" class="minus">−</button>
                  <span class="count">0</span>
                  <button type="button" class="plus">+</button>
                </div>
              </div>

              <div class="room-item">
                <label>
                  <input type="checkbox" name="rooms" value="Badrum" />
                  Badrum
                </label>

                <div class="counter">
                  <button type="button" class="minus">−</button>
                  <span class="count">0</span>
                  <button type="button" class="plus">+</button>
                </div>
              </div>

              <div class="room-item">
                <label>
                  <input type="checkbox" name="rooms" value="Sovrum" />
                  Sovrum
                </label>

                <div class="counter">
                  <button type="button" class="minus">−</button>
                  <span class="count">0</span>
                  <button type="button" class="plus">+</button>
                </div>
              </div>

              <div class="room-item">
                <label>
                  <input type="checkbox" name="rooms" value="Vardagsrum" />
                  Vardagsrum
                </label>

                <div class="counter">
                  <button type="button" class="minus">−</button>
                  <span class="count">0</span>
                  <button type="button" class="plus">+</button>
                </div>
              </div>

              <div class="room-item">
                <label>
                  <input type="checkbox" name="rooms" value="Hall" />
                  Hall
                </label>

                <div class="counter">
                  <button type="button" class="minus">−</button>
                  <span class="count">0</span>
                  <button type="button" class="plus">+</button>
                </div>
              </div>

              <div class="room-item">
                <label>
                  <input type="checkbox" name="rooms" value="Tvättstuga" />
                  Tvättstuga
                </label>

                <div class="counter">
                  <button type="button" class="minus">−</button>
                  <span class="count">0</span>
                  <button type="button" class="plus">+</button>
                </div>
              </div>

              <div class="room-item">
                <label>
                  <input type="checkbox" name="rooms" value="Balkong" />
                  Balkong
                </label>

                <div class="counter">
                  <button type="button" class="minus">−</button>
                  <span class="count">0</span>
                  <button type="button" class="plus">+</button>
                </div>
              </div>
            </div>
          </div>

          <div class="form-group booking-calendar-area">
            <div class="calendar-column">
              <label class="calendar-title">Välj datum</label>

              <div class="custom-calendar">
                <div class="calendar-header">
                  <button type="button" id="prev-month">‹</button>
                  <h3 id="calendar-month"></h3>
                  <button type="button" id="next-month">›</button>
                </div>

                <div class="calendar-weekdays">
                  <span>Mån</span><span>Tis</span><span>Ons</span
                  ><span>Tor</span> <span>Fre</span><span>Lör</span
                  ><span>Sön</span>
                </div>

                <div class="calendar-days" id="calendar-days"></div>
              </div>
            </div>

            <div class="slots-column">
              <label class="calendar-title">Lediga tider</label>

              <div class="slots-box">
                <div class="calendar-slots" id="available-slots">
                  <p class="slot-message">
                    Välj ett datum för att se lediga tider.
                  </p>
                </div>
              </div>
            </div>
          </div>

          <button type="submit" class="submit-btn">
            Skicka bokningsförfrågan
          </button>
          <p class="booking-confirmation" id="booking-confirmation">
            Tack! Din bokningsförfrågan har skickats. Vi kontaktar dig snart.
          </p>
        </form>
      </section>
    </main>

    <script src="javascript/service-page.js"></script>
  </body>
</html>
