<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>J.A.G Städ</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <div class="container">
      <!-- TOP SECTION -->
      <section class="top-section">
        <!-- LEFT -->
        <div class="left-side">
          <!-- LOGO -->
          <div class="logo-section">
            <img src="images/logo.png" alt="J.A.G Städ" />
          </div>

          <!-- TEXT UNDER LOGO -->
          <div class="text-section">
            <div class="tagline">Renlighet. Kvalitet. Pålitlighet.</div>
            <div class="gold-separator-short"></div>
            <div class="hero-text">
              Vi skapar skinande rena miljöer så att du kan fokusera på det som
              är viktigt för dig.
            </div>
          </div>
        </div>
        <!-- RIGHT SIDE -->
        <div class="image-section">
          <img src="images/cleaning.png" alt="Cleaning service" />
          <div class="badge">
            <svg viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <radialGradient id="badgeGold" cx="35%" cy="25%" r="75%">
                  <stop offset="0%" stop-color="#F8E7A8" />
                  <stop offset="38%" stop-color="#D6AD55" />
                  <stop offset="70%" stop-color="#C39A43" />
                  <stop offset="100%" stop-color="#A87928" />
                </radialGradient>

                <filter
                  id="badgeShadow"
                  x="-30%"
                  y="-30%"
                  width="160%"
                  height="160%"
                >
                  <feDropShadow
                    dx="0"
                    dy="8"
                    stdDeviation="8"
                    flood-color="#000000"
                    flood-opacity="0.22"
                  />
                </filter>
              </defs>

              <circle
                cx="110"
                cy="110"
                r="96"
                fill="url(#badgeGold)"
                filter="url(#badgeShadow)"
              />

              <g transform="translate(0,-20)">
                <path
                  d="M110 54 L142 66 V88 C142 108 128 122 110 131 C92 122 78 108 78 88 V66 Z"
                  fill="none"
                  stroke="#0B2743"
                  stroke-width="7"
                  stroke-linejoin="round"
                />

                <path
                  d="M96 87 L106 97 L125 78"
                  fill="none"
                  stroke="#0B2743"
                  stroke-width="7"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </g>
              <g transform="translate(0,-10)">
                <text
                  x="110"
                  y="150"
                  text-anchor="middle"
                  font-family="Arial, sans-serif"
                  font-size="18"
                  font-weight="700"
                  fill="#0B2743"
                  letter-spacing="0.5"
                >
                  NÖJDA KUNDER
                </text>

                <text
                  x="110"
                  y="172"
                  text-anchor="middle"
                  font-family="Arial, sans-serif"
                  font-size="18"
                  font-weight="700"
                  fill="#0B2743"
                  letter-spacing="0.5"
                >
                  ÄR VÅR
                </text>

                <text
                  x="110"
                  y="194"
                  text-anchor="middle"
                  font-family="Arial, sans-serif"
                  font-size="18"
                  font-weight="700"
                  fill="#0B2743"
                  letter-spacing="0.5"
                >
                  PRIORITET
                </text>
              </g>
            </svg>
          </div>
        </div>
      </section>

      <!-- BOTTOM SECTION - CATEGORIES -->
      <section class="categories">
        <!-- KONTORSSTÄD -->
        <div class="category">
          <a href="kontorsstäd.html">
            <div class="category-icon">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
                <path d="M10 86h80" />
                <path d="M18 86V30h22v56" />
                <path d="M40 86V16h28v70" />
                <path d="M68 86V42h18v44" />
                <path d="M28 42h4v7h-4z" />
                <path d="M28 58h4v7h-4z" />
                <path d="M50 28h5v8h-5z" />
                <path d="M50 46h5v8h-5z" />
                <path d="M50 64h5v8h-5z" />
                <path d="M75 54h4v7h-4z" />
                <path d="M75 69h4v7h-4z" />
                <path d="M55 86V74h10v12" />
              </svg>
            </div>
          </a>
          <div class="category-content">
            <div class="label">KONTORSSTÄD</div>
            <p>
              Rent och fräscht<br />
              på arbetsplatsen
            </p>
          </div>
        </div>

        <!-- HEMSTÄD -->
        <div class="category">
          <a href="hemstäd.html">
            <div class="category-icon">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
                <path d="M13 48L50 16l37 32" />
                <path d="M22 44v40h22V62h12v22h22V44" />
                <path d="M31 41L50 25l19 16" />
              </svg>
            </div>
          </a>
          <div class="category-content">
            <div class="label">HEMSTÄD</div>
            <p>
              Skinande rent<br />
              i ditt hem
            </p>
          </div>
        </div>

        <!-- FLYTTSTÄD -->
        <div class="category">
          <a href="flyttstäd.html">
            <div class="category-icon">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
                <rect x="18" y="18" width="64" height="64" rx="4" />
                <path d="M50 18v64" />
                <path d="M18 50h64" />
              </svg>
            </div>
          </a>
          <div class="category-content">
            <div class="label">FLYTTSTÄD</div>
            <p>
              Noggrant och<br />
              klart för nästa steg
            </p>
          </div>
        </div>

        <!-- FASTIGHETSSTÄD -->
        <div class="category">
          <a href="fastighetsstäd.html">
            <div class="category-icon">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
                <path d="M10 86h80" />
                <path d="M16 86V46h22v40" />
                <path d="M38 86V20h24v66" />
                <path d="M62 86V50h22v36" />
                <path d="M25 58h4v6h-4z" />
                <path d="M25 72h4v6h-4z" />
                <path d="M47 32h5v7h-5z" />
                <path d="M47 48h5v7h-5z" />
                <path d="M47 64h5v7h-5z" />
                <path d="M71 62h4v6h-4z" />
                <path d="M71 74h4v6h-4z" />
                <path d="M46 86V76h8v10" />
              </svg>
            </div>
          </a>
          <div class="category-content">
            <div class="label">FASTIGHETSSTÄD</div>
            <p>
              Vi tar hand om hela<br />
              din fastighet
            </p>
          </div>
        </div>
      </section>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="javascript/script.js"></script>
  </body>
</html>
